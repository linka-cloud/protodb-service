version: v2
plugins:
- local: protoc-gen-go-patch
  out: .
  opt:
  - plugin=go
  - paths=source_relative
- local: protoc-gen-go-patch
  out: .
  opt:
  - plugin=go-grpc
  - paths=source_relative
- local: protoc-gen-go-patch
  out: .
  opt:
  - plugin=go-vtproto
  - paths=source_relative
  - features=marshal+unmarshal+size+equal+clone
- local: protoc-gen-go-patch
  out: .
  opt:
  - plugin=protodb-service
  - paths=source_relative
